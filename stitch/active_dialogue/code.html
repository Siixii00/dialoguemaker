<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Teyvat Elegance - Active Dialogue</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&family=Lora:wght@400;500&family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://apis.google.com/js/platform.js" async defer></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#D3BC8E',
                        surface: 'rgba(31, 37, 47, 0.85)',
                        textLight: '#ECE5D8',
                        textDark: '#2B333E',
                        muted: '#8A95A5'
                    },
                    fontFamily: {
                        display: ['Cinzel', 'serif'],
                        body: ['Lora', 'serif']
                    }
                }
            }
        };
    </script>
    <link rel="stylesheet" href="css/style.css"/>
</head>
<body class="bg-black text-textLight font-body h-screen overflow-hidden">
    
    <button id="edit-toggle" class="fixed top-4 right-4 z-50 edit-btn px-4 py-2 rounded-full font-display text-sm flex items-center gap-2">
        <span class="material-symbols-outlined">edit</span>
        <span>EDIT MODE</span>
    </button>

    <div id="bg" class="absolute inset-0 bg-cover" style="background-color: #1F252F;"></div>

    <div id="char-container" class="absolute bottom-[200px] left-[5%] h-[400px] z-10 pointer-events-none">
        <img id="char-preview" class="h-full object-contain drop-shadow-2xl hidden" src="" alt="Character"/>
    </div>

    <div class="absolute inset-0 z-20 flex flex-col justify-between p-8 pointer-events-none">
        
        <div class="flex justify-between w-full pointer-events-auto">
            <button class="text-muted hover:text-primary flex items-center gap-2 bg-black/40 backdrop-blur-sm rounded-full px-4 py-2 border border-white/10">
                <span class="material-symbols-outlined">arrow_back</span>
                <span class="font-display text-sm uppercase">Log</span>
            </button>
            <div class="flex gap-4">
                <button class="text-muted hover:text-primary flex items-center gap-2 bg-black/40 backdrop-blur-sm rounded-full px-4 py-2 border border-white/10">
                    <span class="material-symbols-outlined">play_circle</span>
                    <span class="font-display text-sm uppercase">Auto</span>
                </button>
                <button class="text-muted hover:text-primary flex items-center gap-2 bg-black/40 backdrop-blur-sm rounded-full px-4 py-2 border border-white/10">
                    <span class="material-symbols-outlined">fast_forward</span>
                    <span class="font-display text-sm uppercase">Skip</span>
                </button>
            </div>
        </div>

        <div class="w-full max-w-[1200px] mx-auto relative pointer-events-auto mb-8">
            <div class="absolute -top-12 left-8 bg-primary z-30 px-6 py-3 shadow-lg">
                <h2 id="char-name" class="font-display font-bold text-textDark text-xl">Character Name</h2>
            </div>

            <div class="relative bg-surface backdrop-blur-md border-t-2 border-primary shadow-2xl h-[240px] w-full flex flex-col p-10">
                <div class="flex-grow overflow-y-auto">
                    <p id="dialogue" class="text-xl text-textLight leading-relaxed font-body">Enter your dialogue text here...</p>
                </div>
                <div class="absolute bottom-8 right-10 animate-bounce">
                    <svg class="w-8 h-8 diamond" viewBox="0 0 24 24">
                        <path d="M12 4L20 12L12 20L4 12L12 4Z"/>
                    </svg>
                </div>
            </div>
        </div>
    </div>

    <div id="edit-panel" class="fixed top-0 right-0 h-full w-96 edit-panel z-50 transform translate-x-full transition-transform overflow-y-auto">
        <div class="p-6 space-y-6">
            
            <div class="flex justify-between border-b border-primary/20 pb-4">
                <h3 class="font-display text-xl text-primary">Edit Mode</h3>
                <button id="close-edit" class="text-muted hover:text-primary">
                    <span class="material-symbols-outlined">close</span>
                </button>
            </div>

            <div class="space-y-2">
                <label class="font-display text-sm text-primary">Character Name</label>
                <input type="text" id="edit-name" class="edit-input w-full px-4 py-2 rounded" placeholder="Enter name"/>
            </div>

            <div class="space-y-2">
                <label class="font-display text-sm text-primary">Dialogue Text</label>
                <textarea id="edit-dialogue" class="edit-input w-full px-4 py-3 rounded h-32 resize-none" placeholder="Enter dialogue..."></textarea>
            </div>

            <div class="space-y-2">
                <label class="font-display text-sm text-primary">Character Portrait</label>
                <div class="flex gap-2">
                    <input type="file" id="char-upload" accept="image/*" class="hidden"/>
                    <button onclick="document.getElementById('char-upload').click()" class="edit-btn px-4 py-2 rounded">Upload</button>
                    <button id="clear-char" class="edit-btn px-4 py-2 rounded">Clear</button>
                </div>
                <img id="char-thumb" class="image-preview hidden mt-2"/>
            </div>

            <div class="space-y-2">
                <label class="font-display text-sm text-primary">Background</label>
                <div class="flex gap-2">
                    <input type="file" id="bg-upload" accept="image/*" class="hidden"/>
                    <button onclick="document.getElementById('bg-upload').click()" class="edit-btn px-4 py-2 rounded">Upload</button>
                    <button id="clear-bg" class="edit-btn px-4 py-2 rounded">Clear</button>
                </div>
                <img id="bg-thumb" class="image-preview hidden mt-2"/>
            </div>

            <div class="pt-4 border-t border-primary/20 space-y-3">
                <button id="save-config" class="edit-btn w-full px-4 py-3 rounded font-display flex items-center justify-center gap-2">
                    <span class="material-symbols-outlined">save</span>
                    Save Config
                </button>
                <button id="load-config" class="edit-btn w-full px-4 py-3 rounded font-display flex items-center justify-center gap-2">
                    <span class="material-symbols-outlined">folder_open</span>
                    Load Config
                </button>
                <input type="file" id="config-upload" accept=".json" class="hidden"/>
            </div>
        </div>
    </div>

    <script src="js/auth.js"></script>
    <script src="js/editor.js"></script>
</body>
</html>
